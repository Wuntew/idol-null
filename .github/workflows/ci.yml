name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  supabase-drift:
    name: Supabase Drift
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check Supabase secrets
        id: supabase-secrets
        shell: bash
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [[ -n "$SUPABASE_ACCESS_TOKEN" && -n "$SUPABASE_PROJECT_REF" && -n "$SUPABASE_DB_PASSWORD" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Supabase drift check because SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, or SUPABASE_DB_PASSWORD is not configured."
          fi

      - name: Checkout
        if: steps.supabase-secrets.outputs.configured == 'true'
        uses: actions/checkout@v7

      - name: Setup Supabase CLI
        if: steps.supabase-secrets.outputs.configured == 'true'
        uses: supabase/setup-cli@v2.1.1
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Setup Node
        if: steps.supabase-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Link project
        if: steps.supabase-secrets.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify remote database is up to date
        if: steps.supabase-secrets.outputs.configured == 'true'
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Run Supabase economy smoke tests
        if: steps.supabase-secrets.outputs.configured == 'true'
        run: npm run smoke:supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
